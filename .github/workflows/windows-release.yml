name: Windows Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build bspguy-revamped (Windows x64)
    runs-on: windows-latest

    env:
      APP_NAME: bspguy-revamped
      RELEASE_VERSION: v1.0.${{ github.run_number }}
      ARCHIVE_NAME: bspguy-revamped-v1.0.${{ github.run_number }}-windows-x64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.0
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -A x64
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Prepare Artifacts
        shell: bash
        run: |
          cmake --install build --prefix dist/${APP_NAME} --config Release

      - name: Create ZIP Package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/${{ env.APP_NAME }}/* -DestinationPath "dist/${{ env.ARCHIVE_NAME }}" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: dist/${{ env.ARCHIVE_NAME }}

  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'

    env:
      APP_NAME: bspguy-revamped
      RELEASE_VERSION: v1.0.${{ github.run_number }}
      ARCHIVE_NAME: bspguy-revamped-v1.0.${{ github.run_number }}-windows-x64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_VERSION}"
          git push origin "${RELEASE_VERSION}"

      - name: Download build artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.APP_NAME }} ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: release/${{ env.ARCHIVE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}